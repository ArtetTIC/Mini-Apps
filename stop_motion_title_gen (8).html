<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Générateur de Titres Stop Motion</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #2c3e50; color: #ecf0f1; }
        .container { display: flex; height: 100vh; }
        .controls { width: 350px; background: #34495e; padding: 20px; overflow-y: auto; }
        .preview { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
        h1 { font-size: 24px; margin-bottom: 20px; color: #3498db; }
        .control-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; font-size: 14px; }
        input[type="text"], input[type="number"], select, textarea { width: 100%; padding: 10px; border: none; border-radius: 5px; background: #2c3e50; color: #ecf0f1; font-size: 14px; }
        textarea { resize: vertical; font-family: Arial; }
        input[type="color"] { width: 100%; height: 40px; border: none; border-radius: 5px; cursor: pointer; }
        input[type="range"] { width: 100%; }
        button { width: 100%; padding: 15px; border: none; border-radius: 5px; background: #3498db; color: white; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: background 0.3s; }
        button:hover { background: #2980b9; }
        button.stop { background: #e74c3c; }
        button.stop:hover { background: #c0392b; }
        button.export { background: #27ae60; }
        button.export:hover { background: #229954; }
        #animationCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; }
        .letter { position: absolute; font-weight: bold; opacity: 0; }
        .checkbox-group { display: flex; align-items: center; gap: 10px; }
        .checkbox-group input[type="checkbox"] { width: auto; }
        .export-info { background: #2c3e50; padding: 10px; border-radius: 5px; font-size: 12px; margin-top: 10px; }
        #preview.grainy::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="300" height="300"><filter id="noise"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" stitchTiles="stitch"/></filter><rect width="300" height="300" filter="url(%23noise)" opacity="0.15"/></svg>'); pointer-events: none; z-index: 1; }
    </style>
</head>
<body>
    <div class="container">
        <div class="controls">
            <h1>🎬 Générateur de Titres Stop Motion</h1>
            <div class="control-group"><label>Titre du film :</label><textarea id="titleText" rows="3">MON FILM</textarea></div>

            <div class="control-group"><label>Police d'écriture :</label><select id="fontFamily"><option>Arial</option><option>Impact</option><option>Courier New</option><option>Georgia</option><option>Comic Sans MS</option><option>Verdana</option><option>Times New Roman</option></select></div>
            <div class="control-group"><div class="checkbox-group"><input type="checkbox" id="randomFont"><label for="randomFont" style="margin:0;">Police aléatoire</label></div></div>
            <div class="control-group" id="randomSizeGroup" style="display:none;"><label>Variation taille : <span id="randomSizeValue">20</span>%</label><input type="range" id="randomSize" min="0" max="50" value="20"></div>
            <div class="control-group"><label>Taille texte : <span id="fontSizeValue">80</span>px</label><input type="range" id="fontSize" min="30" max="200" value="80"></div>
            <div class="control-group"><label>Espacement lettres : <span id="letterSpacingValue">0</span>px</label><input type="range" id="letterSpacing" min="-20" max="50" value="0"></div>

            <div class="control-group"><label>Couleur texte :</label><input type="color" id="textColor" value="#ffffff"></div>
            <div class="control-group"><div class="checkbox-group"><input type="checkbox" id="randomTextColor"><label for="randomTextColor" style="margin:0;">Couleurs aléatoires</label></div></div>
            <div class="control-group" id="paletteGroup" style="display:none;"><label>Palette Coolors (URL ou codes hex) :</label><input type="text" id="paletteInput" placeholder="https://coolors.co/... ou #ff5733-#33ff57-..."><small style="color:#95a5a6;display:block;margin-top:5px;">Collez l'URL Coolors ou les codes séparés par -</small></div>
            <div class="control-group"><label>Couleur fond 1 :</label><input type="color" id="bgColor1" value="#3498db"></div>
            <div class="control-group"><label>Couleur fond 2 :</label><input type="color" id="bgColor2" value="#2c3e50"></div>
            <div class="control-group"><div class="checkbox-group"><input type="checkbox" id="useGradient" checked><label for="useGradient" style="margin:0;">Dégradé</label></div></div>
            <div class="control-group"><div class="checkbox-group"><input type="checkbox" id="cutoutStyle"><label for="cutoutStyle" style="margin:0;">Lettres découpées</label></div></div>
            <div class="control-group" id="paperColorGroup" style="display:none;"><label>Couleur papier :</label><input type="color" id="paperColor" value="#f4e4c1"></div>
            <div class="control-group" id="randomPaperGroup" style="display:none;"><div class="checkbox-group"><input type="checkbox" id="randomPaperColor"><label for="randomPaperColor" style="margin:0;">Papiers colorés aléatoires</label></div></div>
            <div class="control-group"><div class="checkbox-group"><input type="checkbox" id="fadeInEffect"><label for="fadeInEffect" style="margin:0;">Effet fondu</label></div></div>
            <div class="control-group"><div class="checkbox-group"><input type="checkbox" id="shadowEffect"><label for="shadowEffect" style="margin:0;">Ombre portée</label></div></div>
            <div class="control-group" id="shadowControls" style="display:none;"><label>Distance : <span id="shadowDistanceValue">4</span>px</label><input type="range" id="shadowDistance" min="1" max="15" value="4"><label>Puissance : <span id="shadowBlurValue">6</span>px</label><input type="range" id="shadowBlur" min="0" max="20" value="6"></div>
            <div class="control-group"><div class="checkbox-group"><input type="checkbox" id="grainEffect"><label for="grainEffect" style="margin:0;">Grain papier</label></div></div>
            <button id="startBtn">▶️ Lancer</button>
            <button id="stopBtn" class="stop" style="display:none;">⏹️ Arrêter</button>
            <button id="resetBtn">🔄 Réinitialiser</button>
            <button id="exportBtn" class="export">📸 Exporter PNG</button>
            <div id="exportInfo" class="export-info" style="display:none;"></div>
        </div>
        <div class="preview" id="preview"><div id="animationCanvas"></div></div>
    </div>
    <script>
